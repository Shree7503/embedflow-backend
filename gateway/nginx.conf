worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    server {
        listen 80;
        server_name localhost;

        location /api/ {
            proxy_pass http://localhost:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}